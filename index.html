<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Semi Clouds</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <p class="hero-sub">February &mdash; September 2024</p>
      <h1 class="hero-title">Semi Clouds</h1>
      <p class="hero-desc">279 photos &nbsp;&bull;&nbsp; 8 months &nbsp;&bull;&nbsp; across America</p>
      <a href="#map-section" class="hero-btn">Explore the Map</a>
    </div>
    <div class="hero-scroll">scroll</div>
  </header>
  <nav class="timeline">
    <button class="tl-btn active" data-month="all">All</button>
    <button class="tl-btn" data-month="2">Feb</button>
    <button class="tl-btn" data-month="3">Mar</button>
    <button class="tl-btn" data-month="4">Apr</button>
    <button class="tl-btn" data-month="5">May</button>
    <button class="tl-btn" data-month="6">Jun</button>
    <button class="tl-btn" data-month="7">Jul</button>
    <button class="tl-btn" data-month="8">Aug</button>
    <button class="tl-btn" data-month="9">Sep</button>
  </nav>
  <section id="map-section" class="map-section">
    <div id="map"></div>
    <div class="map-stats">
      <div class="stat"><span class="stat-num" id="stat-photos">279</span><span class="stat-label">Photos</span></div>
      <div class="stat"><span class="stat-num" id="stat-pins">243</span><span class="stat-label">GPS Points</span></div>
      <div class="stat"><span class="stat-num" id="stat-months">8</span><span class="stat-label">Months</span></div>
    </div>
  </section>
  <section class="gallery-section">
    <h2 class="section-title">All Photos</h2>
    <div class="gallery-filter">
      <button class="filter-btn active" data-month="all">All</button>
      <button class="filter-btn" data-month="2">February <span class="count">2</span></button>
      <button class="filter-btn" data-month="3">March <span class="count">87</span></button>
      <button class="filter-btn" data-month="4">April <span class="count">45</span></button>
      <button class="filter-btn" data-month="5">May <span class="count">33</span></button>
      <button class="filter-btn" data-month="6">June <span class="count">22</span></button>
      <button class="filter-btn" data-month="7">July <span class="count">39</span></button>
      <button class="filter-btn" data-month="8">August <span class="count">40</span></button>
      <button class="filter-btn" data-month="9">September <span class="count">11</span></button>
    </div>
    <div class="gallery-grid" id="gallery-grid"></div>
  </section>
  <div class="lightbox" id="lightbox">
    <button class="lb-close" id="lb-close">x</button>
    <button class="lb-arrow lb-prev" id="lb-prev">left</button>
    <div class="lb-content">
      <img class="lb-img" id="lb-img" src="" alt="" />
      <div class="lb-meta">
        <p class="lb-date" id="lb-date"></p>
        <p class="lb-location" id="lb-location"></p>
      </div>
    </div>
    <button class="lb-arrow lb-next" id="lb-next">right</button>
  </div>
  <div class="lightbox-overlay" id="lightbox-overlay"></div>
  <footer>
    <span>Semi Clouds</span> &mdash; A road trip through America, 2024
  </footer>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="photos.js"></script>
  <script src="app.js"></script>
</body>
</html>
